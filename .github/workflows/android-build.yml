name: LightBox-NG Build

on:
  push:
    branches: [ main, master, 'feature/**', 'fix/**' ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

jobs:
  build:
    name: Build universal APK (arm64 + arm32 in one install)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: 'r27d'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs (debug + release)
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Collect APKs
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find app/build/outputs/apk -type f -name "*.apk" -print -exec cp {} release-artifacts/ \;
          echo "--- Collected ---"
          ls -la release-artifacts/
          # Fail fast if any expected APK is missing
          ls release-artifacts/*universal-debug.apk >/dev/null 2>&1 || { echo "MISSING: universal-debug.apk"; exit 1; }
          ls release-artifacts/*universal-release.apk >/dev/null 2>&1 || { echo "MISSING: universal-release.apk"; exit 1; }

      - name: Verify both ABIs are present in APK
        run: |
          set -euo pipefail
          APK=$(ls release-artifacts/*universal-debug.apk | head -1)
          echo "Inspecting: $APK"
          unzip -l "$APK" | awk '/lib\//{print $NF}' | sed 's|lib/||;s|/.*||' | sort -u > /tmp/abis.txt
          echo "--- ABIs in APK ---"
          cat /tmp/abis.txt
          for req in armeabi-v7a arm64-v8a; do
            if ! grep -qx "$req" /tmp/abis.txt; then
              echo "FATAL: missing required ABI $req"
              exit 1
            fi
          done
          echo "OK: both armeabi-v7a and arm64-v8a are present."

      - name: Verify APK is v2-signed
        run: |
          set -euo pipefail
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          APKSIGNER="$BT/apksigner"
          for apk in release-artifacts/*.apk; do
            echo "--- $apk ---"
            "$APKSIGNER" verify --print-certs "$apk" | head -5
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: LightBox-NG-APKs
          path: release-artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Compute release tag
        id: tag
        if: github.event_name == 'push'
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "pre=false" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pre=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: LightBox-NG ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.tag.outputs.pre }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
